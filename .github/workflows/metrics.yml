name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Main metrics card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ${{ github.repository_owner }}
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Warsaw
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_display: compact
          plugin_languages: yes
          plugin_languages_categories: programming, markup
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage
          plugin_languages_recent_categories: programming, markup
          plugin_languages_recent_load: 300
          filename: github-metrics.svg

      - name: Isometric calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ${{ github.repository_owner }}
          base: ""
          config_timezone: Europe/Warsaw
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          filename: github-metrics-isocalendar.svg

      - name: Coding habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ${{ github.repository_owner }}
          base: ""
          config_timezone: Europe/Warsaw
          plugin_habits: yes
          plugin_habits_days: 30
          plugin_habits_from: 200
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          filename: github-metrics-habits.svg
